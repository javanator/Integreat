#OAuth2 App Configuration
# Secrets are read from the environment. Leave them unset for a local dev run
# (the OAuth flow will simply be inert until you provide keys). NEVER commit real
# values into this file — it lives in version control.

#Development
OAuth2AppClientId=${OAUTH2_CLIENT_ID:}
OAuth2AppClientSecret=${OAUTH2_CLIENT_SECRET:}
OAuth2AppRedirectUri=${OAUTH2_REDIRECT_URI:http://localhost:8080/api/auth/callback}

# JWT signing key. No default is baked into source on purpose.
#   - Dev:  leave JWT_SECRET unset. JwtService generates an ephemeral 256-bit key
#           at startup so the app runs with zero config. Sessions reset on restart.
#   - Prod: export JWT_SECRET as a >= 32-byte (256-bit) random string.
jwt.secret=${JWT_SECRET:}

# Send auth cookies only over HTTPS. false for plain-http local dev; set to true
# (via APP_COOKIE_SECURE=true) the moment the app is reachable over TLS.
app.cookie.secure=${APP_COOKIE_SECURE:false}

#QBO API endpoint
IntuitAccountingAPIHost=https://sandbox-quickbooks.api.intuit.com

server.servlet.context-path=/
server.port = 8080

# Keep third-party/HTTP wire logging quiet by default so bearer tokens and auth
# codes don't land in logs. Flip to DEBUG locally with LOG_LEVEL_HTTP=DEBUG when
# you actually need to trace a request.
logging.level.org.apache.http=${LOG_LEVEL_HTTP:INFO}
logging.level.com.integreat=${LOG_LEVEL_APP:INFO}

# --- Static Resources --- Make sure this matches the output of the buildReact task
# These are in order of precedence
spring.web.resources.static-locations=classpath:/static/

#We're using react baby!
#spring.thymeleaf.prefix=file:frontend/templates/
#spring.thymeleaf.suffix=.html
#spring.thymeleaf.mode=HTML
#spring.thymeleaf.encoding=UTF-8
#spring.thymeleaf.cache=false
#spring.thymeleaf.check-template-location=true
#spring.thymeleaf.template-resolver-order=0

# --- DataSource (SQLite) ---
spring.datasource.url=jdbc:sqlite:data/app.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.pool-name=sqlite-pool

# show-sql echoes every statement (incl. token columns) to the log. Off by default;
# turn on locally with SHOW_SQL=true when debugging queries.
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect

# Optional: schema/data SQL initialization (usually not used with SQLite + JPA)
spring.sql.init.mode=never