#OAuth2 App Configuration

#Development
OAuth2AppClientId=
OAuth2AppClientSecret=
OAuth2AppRedirectUri=

#hmac.secret="THISISMYSUPERSECRETKEY"
jwt.secret="THIS_IS_A_SECRET_THAT_NEEDS_TO_BE_256_BYTES_LONG"

#QBO API endpoint
IntuitAccountingAPIHost=https://sandbox-quickbooks.api.intuit.com

server.servlet.context-path=/
server.port = 8080

logging.level.org.apache.http=DEBUG
logging.level.com.integreat=DEBUG

# --- Static Resources --- Make sure this matches the output of the buildReact task
# These are in order of precedence
spring.web.resources.static-locations=classpath:/static/

#We're using react baby!
#spring.thymeleaf.prefix=file:frontend/templates/
#spring.thymeleaf.suffix=.html
#spring.thymeleaf.mode=HTML
#spring.thymeleaf.encoding=UTF-8
#spring.thymeleaf.cache=false
#spring.thymeleaf.check-template-location=true
#spring.thymeleaf.template-resolver-order=0

# --- DataSource (SQLite) ---
spring.datasource.url=jdbc:sqlite:data/app.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.pool-name=sqlite-pool

spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect

# Optional: schema/data SQL initialization (usually not used with SQLite + JPA)
spring.sql.init.mode=never